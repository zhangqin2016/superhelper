<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能助手</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="dropOverlay" class="drop-overlay" hidden>
      <div class="drop-overlay-content">
        <svg class="drop-overlay-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-overlay-title">拖放文件到这里上传</p>
        <p class="drop-overlay-types">支持图片、文档等常见文件（最大 20MB）</p>
      </div>
    </div>

    <main class="app-shell" id="appShell">

      <aside class="left-panel" id="leftPanel">
        <div class="left-top-actions">
          <input id="globalSearch" class="left-search" type="search" placeholder="搜索对话..." autocomplete="off" />
          <span id="statusBadge" class="status-badge idle">就绪</span>
        </div>

        <div class="left-section left-section-grow">
          <div class="left-section-header">
            <span>我的对话</span>
            <button id="addProjectBtn" class="left-section-btn" title="添加文件夹">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
              </svg>
            </button>
          </div>
          <div id="projectTree" class="project-tree"></div>
        </div>

        <div class="left-section">
          <div class="left-section-header">
            <span>常用问题</span>
          </div>
          <div id="templateList" class="template-list"></div>
        </div>
      </aside>

      <div class="resize-handle resize-handle-left" id="leftResizeHandle"></div>

      <section class="center-panel" id="centerPanel">
        <header class="topbar">
          <div class="topbar-left">
            <button id="leftToggleBtn" class="panel-toggle" title="显示/隐藏侧边栏">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/>
              </svg>
            </button>
            <div class="topbar-info">
              <h1 id="projectTitle" class="editable-title" title="点击可修改对话名称">智能助手</h1>
              <p id="sessionMeta">已就绪</p>
            </div>
          </div>
          <div class="topbar-actions">
            <button id="interruptBtn" class="topbar-btn topbar-btn-stop" title="停止回复" hidden>停止</button>
            <button id="newChatBtn" class="topbar-btn" title="开始新对话">新对话</button>
          </div>
        </header>

        <section id="messagesContainer" class="messages-container">
          <div id="messages" class="messages" aria-live="polite">
            <article class="msg msg-assistant">
              <div class="msg-avatar">助手</div>
              <div class="msg-bubble">你好！我是你的智能助手，有什么可以帮你的？直接输入问题，或点左侧「常用问题」试试。</div>
            </article>
          </div>
          <button id="scrollToBottomBtn" class="scroll-to-bottom-btn" type="button" hidden title="回到最新">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            <span>最新</span>
          </button>
        </section>

        <form id="composer" class="composer">
          <div id="filePreviewArea" class="file-preview-area" hidden></div>
          <div class="composer-row">
            <button id="attachBtn" type="button" class="composer-icon-btn" title="添加图片或文件">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <textarea
              id="promptInput"
              rows="2"
              placeholder="有什么想问的？"
              autofocus
            ></textarea>
            <button id="sendBtn" type="submit" class="send-btn">发送</button>
          </div>
          <input type="file" id="fileInput" multiple hidden />
        </form>
      </section>

    </main>

    <footer class="status-bar" id="statusBar">
      <span class="status-bar-item" id="statusCliState">助手：就绪</span>
      <span class="status-bar-item" id="statusTask">--</span>
      <span class="status-bar-item">
        <button id="statusClearCache" class="status-bar-btn">清理缓存</button>
        <button id="statusCliVersion" class="status-bar-btn">关于</button>
      </span>
    </footer>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../../node_modules/dompurify/dist/purify.min.js"></script>
    <script src="../../node_modules/marked/lib/marked.umd.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
