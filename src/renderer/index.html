<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Super Terminal</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!-- ================================================================== -->
    <!-- Drop Overlay                                                        -->
    <!-- ================================================================== -->
    <div id="dropOverlay" class="drop-overlay" hidden>
      <div class="drop-overlay-content">
        <svg class="drop-overlay-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-overlay-title">拖放文件到这里上传</p>
        <p class="drop-overlay-types">支持图片、文档、代码文件（最大 20MB）</p>
      </div>
    </div>

    <!-- ================================================================== -->
    <!-- App Shell (3-column grid)                                           -->
    <!-- ================================================================== -->
    <main class="app-shell left-collapsed right-collapsed" id="appShell">

      <!-- ================================================================ -->
      <!-- LEFT PANEL                                                        -->
      <!-- ================================================================ -->
      <aside class="left-panel" id="leftPanel">
        <!-- Top actions -->
        <div class="left-top-actions">
          <input id="globalSearch" class="left-search" type="search" placeholder="搜索项目、会话..." autocomplete="off" />
          <span id="statusBadge" class="status-badge idle">就绪</span>
        </div>

        <!-- Project tree (grows to fill) -->
        <div class="left-section left-section-grow">
          <div class="left-section-header">
            <span>工作空间</span>
            <button id="addProjectBtn" class="left-section-btn" title="添加工作空间">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
              </svg>
            </button>
          </div>
          <div id="projectTree" class="project-tree"></div>
        </div>

        <!-- File tree -->
        <div class="left-section">
          <div class="left-section-header">
            <span>文件</span>
            <button id="refreshFileTreeBtn" class="left-section-btn" title="刷新文件树">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
            </button>
          </div>
          <div id="fileTree" class="file-tree"></div>
        </div>

        <!-- Quick templates -->
        <div class="left-section">
          <div class="left-section-header">
            <span>快捷指令</span>
          </div>
          <div id="templateList" class="template-list"></div>
        </div>
      </aside>

      <!-- ================================================================ -->
      <!-- LEFT RESIZE HANDLE                                                -->
      <!-- ================================================================ -->
      <div class="resize-handle resize-handle-left" id="leftResizeHandle"></div>

      <!-- ================================================================ -->
      <!-- CENTER PANEL                                                      -->
      <!-- ================================================================ -->
      <section class="center-panel" id="centerPanel">
        <!-- Topbar -->
        <header class="topbar">
          <div class="topbar-left">
            <button id="leftToggleBtn" class="panel-toggle" title="切换左侧面板">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/>
              </svg>
            </button>
            <div class="topbar-info">
              <h1 id="projectTitle">AI Super Terminal</h1>
              <p id="sessionMeta">已就绪</p>
            </div>
          </div>
          <div class="topbar-center">
            <span id="workingDir" class="working-dir" title="当前工作目录">--</span>
          </div>
          <div class="topbar-actions">
            <div class="mode-switch">
              <button id="modeFastBtn" class="mode-btn active" data-mode="fast">快速</button>
              <button id="modeDeepBtn" class="mode-btn" data-mode="deep">精准</button>
            </div>
            <button id="pluginBtn" class="topbar-btn">插件</button>
            <button id="interruptBtn" class="topbar-btn topbar-btn-stop" title="停止生成">停止</button>
            <button id="newChatBtn" class="topbar-btn" title="新会话">新会话</button>
            <button id="rightToggleBtn" class="panel-toggle" title="切换右侧面板">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="15" y1="3" x2="15" y2="21"/>
              </svg>
            </button>
          </div>
        </header>

        <!-- Chat messages -->
        <section id="messagesContainer" class="messages-container">
          <div id="messages" class="messages" aria-live="polite">
            <article class="msg msg-assistant">
              <div class="msg-avatar">AI</div>
              <div class="msg-bubble">你好！我是你的 AI 超级终端助手。选择一个项目开始工作吧。</div>
            </article>
          </div>

          <!-- Diff viewer (hidden by default) -->
          <div id="diffPanel" class="diff-panel" hidden>
            <div class="diff-header">
              <h3>代码变更</h3>
              <div class="diff-actions">
                <button id="diffAcceptAllBtn" class="diff-btn diff-btn-accept">全部保存</button>
                <button id="diffRejectAllBtn" class="diff-btn diff-btn-reject">全部撤销</button>
              </div>
            </div>
            <div id="diffList" class="diff-list"></div>
          </div>
        </section>

        <!-- Composer -->
        <form id="composer" class="composer">
          <div id="filePreviewArea" class="file-preview-area" hidden></div>
          <div class="composer-row">
            <button id="attachBtn" type="button" class="composer-icon-btn" title="添加附件">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <textarea
              id="promptInput"
              rows="2"
              placeholder="输入你的需求..."
              autofocus
            ></textarea>
            <button id="sendBtn" type="submit" class="send-btn">发送</button>
          </div>
          <input type="file" id="fileInput" multiple hidden />
        </form>
      </section>

      <!-- ================================================================ -->
      <!-- RIGHT RESIZE HANDLE                                               -->
      <!-- ================================================================ -->
      <div class="resize-handle resize-handle-right" id="rightResizeHandle"></div>

      <!-- ================================================================ -->
      <!-- RIGHT PANEL                                                       -->
      <!-- ================================================================ -->
      <aside class="right-panel" id="rightPanel">
        <!-- Task progress -->
        <div class="right-section">
          <div class="right-section-header">
            <span>任务进度</span>
            <button id="clearTasksBtn" class="right-section-btn" title="清空已完成">清空</button>
          </div>
          <div id="taskPanel" class="task-panel">
            <div class="task-empty">暂无运行中的任务</div>
          </div>
        </div>

        <!-- Changes summary -->
        <div class="right-section">
          <div class="right-section-header">
            <span>变更汇总</span>
          </div>
          <div id="changesSummary" class="changes-summary">
            <div class="changes-empty">暂无变更</div>
          </div>
        </div>

        <!-- Native terminal -->
        <div class="right-section right-section-grow">
          <div class="right-section-header">
            <span>终端</span>
            <button id="toggleTerminalBtn" class="right-section-btn" title="打开/关闭终端">展开</button>
          </div>
          <div id="terminalContainer" class="terminal-container" hidden></div>
        </div>
      </aside>

    </main>

    <!-- ================================================================== -->
    <!-- Status Bar                                                         -->
    <!-- ================================================================== -->
    <footer class="status-bar" id="statusBar">
      <span class="status-bar-item" id="statusCliState">CLI: 就绪</span>
      <span class="status-bar-item" id="statusTask">--</span>
      <span class="status-bar-item">
        <button id="statusClearCache" class="status-bar-btn">清理缓存</button>
        <button id="statusCliVersion" class="status-bar-btn">版本</button>
      </span>
    </footer>

    <!-- ================================================================== -->
    <!-- Plugin Panel (overlay)                                             -->
    <!-- ================================================================== -->
    <section id="pluginPanel" class="modal-panel" hidden>
      <div class="modal-card">
        <header class="modal-header">
          <div>
            <h2>插件市场</h2>
            <p>安装 MCP 插件到全局或当前项目。</p>
          </div>
          <button id="closePluginBtn" type="button" class="modal-close-btn">关闭</button>
        </header>
        <div id="pluginList" class="plugin-list"></div>
      </div>
    </section>

    <!-- ================================================================== -->
    <!-- Toast Container                                                    -->
    <!-- ================================================================== -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- ================================================================== -->
    <!-- Scripts                                                            -->
    <!-- ================================================================== -->
    <script src="../../node_modules/dompurify/dist/purify.min.js"></script>
    <script src="../../node_modules/marked/lib/marked.umd.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
