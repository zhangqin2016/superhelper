<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能工作台</title>
    <link rel="icon" type="image/png" href="" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="dropOverlay" class="drop-overlay" hidden>
      <div class="drop-overlay-content">
        <svg class="drop-overlay-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <p class="drop-overlay-title">拖放文件到这里上传</p>
        <p class="drop-overlay-types">支持图片、文档等常见文件（最大 20MB）</p>
      </div>
    </div>

    <main class="app-shell" id="appShell">

      <aside class="left-panel" id="leftPanel">
        <div class="app-brand">
          <img src="" alt="" class="app-logo" width="32" height="32" />
          <span class="app-brand-name">智能工作台</span>
        </div>
        <div class="left-top-actions">
          <input id="globalSearch" class="left-search" type="search" placeholder="搜索对话..." autocomplete="off" />
        </div>

        <div class="left-section left-section-grow">
          <div class="left-section-header">
            <span>我的对话</span>
            <button id="addProjectBtn" class="left-section-btn" title="添加文件夹">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/>
              </svg>
            </button>
          </div>
          <div id="projectTree" class="project-tree"></div>
        </div>

        <div class="left-footer">
          <button id="settingsBtn" class="left-settings-btn" type="button" title="设置">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            <span>设置</span>
          </button>
        </div>

      </aside>

      <div class="resize-handle resize-handle-left" id="leftResizeHandle"></div>

      <section class="center-panel" id="centerPanel">
        <header class="topbar">
          <div class="topbar-left">
            <button id="leftToggleBtn" class="panel-toggle" title="显示/隐藏侧边栏">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/>
              </svg>
            </button>
            <div class="topbar-info">
              <h1 id="projectTitle" class="editable-title" title="点击可修改对话名称">智能工作台</h1>
              <p id="sessionMeta">已就绪</p>
            </div>
          </div>
          <div class="topbar-actions">
            <button id="interruptBtn" class="topbar-btn topbar-btn-stop" title="停止当前回复" hidden>停止</button>
            <button id="newChatBtn" class="topbar-btn" title="开始新对话">新对话</button>
          </div>
        </header>

        <section id="messagesContainer" class="messages-container">
          <div id="sessionMessagesStack" class="session-messages-stack" aria-live="polite"></div>
          <button id="scrollToBottomBtn" class="scroll-to-bottom-btn" type="button" hidden title="回到最新">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            <span>最新</span>
          </button>
        </section>

        <form id="composer" class="composer">
          <div id="filePreviewArea" class="file-preview-area" hidden></div>
          <div class="composer-toolbar">
            <button id="attachBtn" type="button" class="composer-icon-btn" title="添加图片或文件">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
          </div>
          <div class="composer-row">
            <textarea
              id="promptInput"
              rows="2"
              placeholder="有什么想问的？"
              autofocus
            ></textarea>
            <button id="sendBtn" type="submit" class="send-btn">发送</button>
          </div>
          <input type="file" id="fileInput" multiple hidden />
        </form>
      </section>

    </main>

    <div id="settingsPanel" class="settings-panel" hidden>
      <div id="settingsBackdrop" class="settings-panel-backdrop"></div>
      <aside class="settings-panel-sheet" role="dialog" aria-labelledby="settingsPanelTitle">
        <header class="settings-panel-header">
          <h2 id="settingsPanelTitle">设置</h2>
          <button id="settingsCloseBtn" class="settings-panel-close" type="button" aria-label="关闭设置">×</button>
        </header>
        <div class="settings-panel-body">
        <section class="settings-section">
          <h3 class="settings-section-title">模型</h3>
          <p class="settings-section-desc">选择助手使用的模型预设，网关与密钥由应用内置配置提供。</p>
          <select id="modelPresetSelect" class="settings-select" aria-label="选择模型"></select>
        </section>
        <section class="settings-section">
          <h3 class="settings-section-title">权限</h3>
          <p class="settings-section-desc">控制助手执行工具时的确认方式。切换后会在下次发送时生效。</p>
          <select id="permissionModeSelect" class="settings-select" aria-label="选择权限模式"></select>
        </section>
        <section class="settings-section">
          <h3 class="settings-section-title">联网搜索</h3>
          <p class="settings-section-desc">选择助手联网查资料时使用的搜索引擎。切换后对新的对话生效。</p>
          <select id="searchProviderSelect" class="settings-select" aria-label="选择搜索引擎"></select>
          <div id="searchSearxngUrlRow" class="skills-registry-row search-provider-row">
            <input
              id="searchSearxngUrl"
              class="skills-registry-input"
              type="url"
              placeholder="自定义 SearXNG 实例（可选），如 https://searx.example.com"
              autocomplete="off"
            />
            <button id="searchSaveSearxngUrlBtn" class="settings-action-btn" type="button">保存</button>
          </div>
          <p id="searchSearxngHint" class="skills-registry-hint">填写自定义 SearXNG 实例后将优先使用；留空则自动尝试内置公共实例。</p>
        </section>
        <section class="settings-section">
          <h3 class="settings-section-title">技能中心</h3>
          <p class="settings-section-desc">管理助手可用的扩展能力。配置技能目录 URL 后，可从远程安装符合协议的技能包。更改后对新的对话生效。</p>
          <label class="skills-registry-label" for="skillsRegistryUrl">技能目录 URL</label>
          <div class="skills-registry-row">
            <input
              id="skillsRegistryUrl"
              class="skills-registry-input"
              type="url"
              placeholder="https://your-server.com/skills/registry.json"
              spellcheck="false"
            />
            <button id="skillsSaveRegistryBtn" class="settings-action-btn" type="button">保存</button>
          </div>
          <p id="skillsRegistryHint" class="skills-registry-hint"></p>
          <div class="settings-actions skills-actions">
            <button id="skillsCheckUpdatesBtn" class="settings-action-btn" type="button">检查更新</button>
            <button id="skillsRefreshBtn" class="settings-action-btn" type="button">刷新配置</button>
          </div>
          <h4 class="skills-subsection-title">已安装</h4>
          <div id="skillsList" class="skills-list"></div>
          <h4 id="skillsAvailableTitle" class="skills-subsection-title" hidden>可安装</h4>
          <div id="skillsAvailableList" class="skills-list"></div>
        </section>
        <section class="settings-section settings-about">
          <img src="" alt="" class="settings-about-logo" width="72" height="72" />
          <p class="settings-about-name">智能工作台</p>
          <p class="settings-about-version">版本 0.1.0</p>
        </section>
        <section class="settings-section">
          <h3 class="settings-section-title">其他</h3>
          <div class="settings-actions">
            <button id="settingsClearCache" class="settings-action-btn" type="button">清理缓存</button>
          </div>
        </section>
        </div>
      </aside>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="../../node_modules/dompurify/dist/purify.min.js"></script>
    <script src="../../node_modules/marked/lib/marked.umd.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
