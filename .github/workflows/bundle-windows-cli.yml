# Build Windows claude.exe on GitHub-hosted runner; download artifact after run.
# Place artifact at bundles/win32-x64/claude.exe then: npm run dist:win

name: Bundle Windows CLI

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: npm package version (empty = latest)
        required: false
        type: string
  push:
    branches: [master]
    paths:
      - .github/workflows/bundle-windows-cli.yml

permissions:
  contents: read

jobs:
  bundle-windows-cli:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CLI
        shell: pwsh
        run: |
          $version = "${{ inputs.package_version }}".Trim()
          if ($version) {
            npm install -g "@anthropic-ai/claude-code@$version"
          } else {
            npm install -g @anthropic-ai/claude-code
          }
          npm list -g @anthropic-ai/claude-code --depth=0

      - name: Copy claude.exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $destDir = "bundles/win32-x64"
          $dest = Join-Path $destDir "claude.exe"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $cmd = Get-Command claude -ErrorAction Stop
          $source = $cmd.Source
          if ($source -match '\.cmd$') {
            $exeCandidate = Join-Path (Split-Path $source -Parent) "claude.exe"
            if (Test-Path $exeCandidate) { $source = $exeCandidate }
          }
          Copy-Item -Force $source $dest
          Get-Item $dest | Format-List FullName, Length

      - name: Smoke test
        shell: pwsh
        run: |
          & bundles/win32-x64/claude.exe --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win32-x64-claude-cli
          path: bundles/win32-x64/claude.exe
          retention-days: 30
          if-no-files-found: error
