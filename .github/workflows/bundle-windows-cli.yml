# Build Windows claude.exe on GitHub-hosted Windows runner and upload as artifact.
# The binary is gitignored; download it after the workflow completes.
#
# Usage:
#   Actions → Bundle Windows CLI → Run workflow
#   Download artifact "win32-x64-claude-cli" → place at bundles/win32-x64/claude.exe
#   npm run dist:win

name: Bundle Windows CLI

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: "npm 包版本（留空则安装 latest）"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  bundle-windows-cli:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CLI (npm global)
        shell: pwsh
        run: |
          $version = "${{ inputs.package_version }}".Trim()
          if ($version) {
            npm install -g "@anthropic-ai/claude-code@$version"
          } else {
            npm install -g @anthropic-ai/claude-code
          }
          npm list -g @anthropic-ai/claude-code --depth=0

      - name: Copy claude.exe into bundles/win32-x64
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $destDir = "bundles/win32-x64"
          $dest = Join-Path $destDir "claude.exe"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null

          $cmd = Get-Command claude -ErrorAction Stop
          $source = $cmd.Source
          Write-Host "Found claude at: $source"

          # npm may expose claude.cmd; prefer sibling claude.exe if present
          if ($source -match '\.cmd$') {
            $dir = Split-Path $source -Parent
            $exeCandidate = Join-Path $dir "claude.exe"
            if (Test-Path $exeCandidate) {
              $source = $exeCandidate
              Write-Host "Using sibling: $source"
            }
          }

          Copy-Item -Force $source $dest
          $info = Get-Item $dest
          Write-Host "Copied $($info.Length) bytes to $($info.FullName)"

      - name: Smoke test
        shell: pwsh
        run: |
          $dest = "bundles/win32-x64/claude.exe"
          & $dest --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win32-x64-claude-cli
          path: bundles/win32-x64/claude.exe
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        shell: pwsh
        run: |
          $sizeMB = [math]::Round((Get-Item bundles/win32-x64/claude.exe).Length / 1MB, 1)
          @"
          ## Windows CLI 已打包

          - 文件: \`bundles/win32-x64/claude.exe\`（约 ${sizeMB} MB）
          - 下载: Actions 本 run 的 Artifacts → **win32-x64-claude-cli**
          - 本地放置后执行: \`npm run dist:win\`

          > 该文件已在 .gitignore 中，不会自动提交到仓库。
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
