# Build Windows claude.exe on GitHub-hosted runner; download artifact after run.
# Place artifact at bundles/win32-x64/engine-upstream.exe then: npm run dist:win

name: Bundle Windows CLI

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: npm package version (empty = latest)
        required: false
        type: string
  push:
    branches: [master]
    paths:
      - .github/workflows/bundle-windows-cli.yml

permissions:
  contents: read

jobs:
  bundle-windows-cli:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CLI
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ inputs.package_version }}".Trim()
          if ($version) {
            npm install -g "@anthropic-ai/claude-code@$version" --include=optional
            npm install -g "@anthropic-ai/claude-code-win32-x64@$version"
          } else {
            npm install -g @anthropic-ai/claude-code --include=optional
            npm install -g @anthropic-ai/claude-code-win32-x64
          }
          npm list -g @anthropic-ai/claude-code @anthropic-ai/claude-code-win32-x64 --depth=0

      - name: Link native binary (postinstall)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $globalModules = npm root -g
          $installScript = Join-Path $globalModules "@anthropic-ai/claude-code/install.cjs"
          if (-not (Test-Path $installScript)) {
            throw "install.cjs not found at $installScript"
          }
          node $installScript

      - name: Copy native engine binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $destDir = "bundles/win32-x64"
          $dest = Join-Path $destDir "engine-upstream.exe"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null

          $globalModules = (npm root -g).Trim()
          $explicitPaths = @(
            (Join-Path $globalModules "@anthropic-ai\claude-code-win32-x64\claude.exe"),
            (Join-Path $globalModules "@anthropic-ai\claude-code\node_modules\@anthropic-ai\claude-code-win32-x64\claude.exe")
          )

          $source = $null
          foreach ($p in $explicitPaths) {
            if (Test-Path $p) {
              $source = $p
              break
            }
          }

          if (-not $source) {
            $hits = Get-ChildItem -Path $globalModules -Recurse -Filter "claude.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "claude-code-win32-x64" } |
              Sort-Object Length -Descending
            if ($hits) { $source = $hits[0].FullName }
          }

          if (-not $source) {
            Write-Host "npm root -g: $globalModules"
            Write-Host "anthropic packages:"
            $anthropicDir = Join-Path $globalModules "@anthropic-ai"
            if (Test-Path $anthropicDir) {
              Get-ChildItem $anthropicDir -Directory | ForEach-Object {
                Write-Host "  $($_.Name)"
                Get-ChildItem $_.FullName -ErrorAction SilentlyContinue | Select-Object -First 8 | ForEach-Object {
                  Write-Host "    $($_.Name)"
                }
              }
            } else {
              Write-Host "  (missing $anthropicDir)"
            }
            throw "Could not locate @anthropic-ai/claude-code-win32-x64/claude.exe"
          }

          $header = [System.IO.File]::ReadAllBytes($source)[0..1]
          if ($header[0] -ne 0x4D -or $header[1] -ne 0x5A) {
            throw "Not a PE executable (expected MZ header): $source"
          }

          Write-Host "Copying $source ($((Get-Item $source).Length) bytes)"
          Copy-Item -Force $source $dest
          Get-Item $dest | Format-List FullName, Length

      - name: Smoke test
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          & "bundles/win32-x64/engine-upstream.exe" --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: win32-x64-engine-cli
          path: bundles/win32-x64/engine-upstream.exe
          retention-days: 30
          if-no-files-found: error
